<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="100%" height="100%">
  <defs>
    <!-- Glow and Neon Filters -->
    <filter id="neon-glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="neon-glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Gradients -->
    <radialGradient id="bg-glow" cx="50%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#112446" />
      <stop offset="100%" stop-color="#070b19" />
    </radialGradient>

    <linearGradient id="metal-arm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="50%" stop-color="#d9e2ec" />
      <stop offset="100%" stop-color="#829ab1" />
    </linearGradient>

    <linearGradient id="metal-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#486581" />
      <stop offset="100%" stop-color="#1f2933" />
    </linearGradient>

    <linearGradient id="orange-glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9800" />
      <stop offset="100%" stop-color="#ff5722" />
    </linearGradient>

    <linearGradient id="chip-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#102a43" />
      <stop offset="50%" stop-color="#243b53" />
      <stop offset="100%" stop-color="#0b1d33" />
    </linearGradient>
    
    <linearGradient id="grid-grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ff5722" stop-opacity="0.3" />
      <stop offset="50%" stop-color="#00bcd4" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#070b19" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="450" fill="url(#bg-glow)" />

  <!-- Grid Perspective Floor -->
  <g opacity="0.4">
    <!-- Perspective horizontal lines -->
    <path d="M 0,380 L 600,380 M 0,400 L 600,400 M 0,420 L 600,420 M 0,440 L 600,440" stroke="#00d2ff" stroke-width="0.8" opacity="0.3"/>
    <!-- Perspective vanishing lines -->
    <path d="M 300,280 L -100,450 M 300,280 L 50,450 M 300,280 L 200,450 M 300,280 L 300,450 M 300,280 L 400,450 M 300,280 L 550,450 M 300,280 L 700,450" stroke="#00d2ff" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- Glowing background circuit dots -->
  <g opacity="0.2">
    <circle cx="100" cy="150" r="1.5" fill="#00d2ff" />
    <circle cx="120" cy="130" r="2.5" fill="#ff9800" />
    <path d="M 100,150 L 120,130" stroke="#00d2ff" stroke-width="0.5" />
    <circle cx="500" cy="100" r="2" fill="#00d2ff" />
    <circle cx="480" cy="70" r="2" fill="#00d2ff" />
    <path d="M 500,100 L 480,70" stroke="#00d2ff" stroke-width="0.5" />
  </g>

  <!-- AI CHIP COMPONENT (Right Side Background) -->
  <g id="ai-chip" transform="translate(360, 160)">
    <!-- Outer Glow -->
    <rect x="-10" y="-10" width="160" height="160" rx="15" fill="none" stroke="#00f0ff" stroke-width="3" filter="url(#neon-glow-blue)" opacity="0.5" />
    
    <!-- Chip Body -->
    <rect x="0" y="0" width="140" height="140" rx="10" fill="url(#chip-grad)" stroke="#1982c4" stroke-width="3" />
    
    <!-- Gold / Copper Corner Accents -->
    <polygon points="5,5 25,5 5,25" fill="#ff9800" />
    <polygon points="135,5 115,5 135,25" fill="#ff9800" />
    <polygon points="5,135 25,135 5,115" fill="#ff9800" />
    <polygon points="135,135 115,135 135,115" fill="#ff9800" />

    <!-- Chip Pins / Connectors -->
    <!-- Top & Bottom Pins -->
    <g fill="#ff9800" opacity="0.8">
      <rect x="20" y="-6" width="6" height="6" />
      <rect x="40" y="-6" width="6" height="6" />
      <rect x="60" y="-6" width="6" height="6" />
      <rect x="80" y="-6" width="6" height="6" />
      <rect x="100" y="-6" width="6" height="6" />
      <rect x="120" y="-6" width="6" height="6" />
      
      <rect x="20" y="140" width="6" height="6" />
      <rect x="40" y="140" width="6" height="6" />
      <rect x="60" y="140" width="6" height="6" />
      <rect x="80" y="140" width="6" height="6" />
      <rect x="100" y="140" width="6" height="6" />
      <rect x="120" y="140" width="6" height="6" />
      
      <!-- Left & Right Pins -->
      <rect x="-6" y="20" width="6" height="6" />
      <rect x="-6" y="40" width="6" height="6" />
      <rect x="-6" y="60" width="6" height="6" />
      <rect x="-6" y="80" width="6" height="6" />
      <rect x="-6" y="100" width="6" height="6" />
      <rect x="-6" y="120" width="6" height="6" />
      
      <rect x="140" y="20" width="6" height="6" />
      <rect x="140" y="40" width="6" height="6" />
      <rect x="140" y="60" width="6" height="6" />
      <rect x="140" y="80" width="6" height="6" />
      <rect x="140" y="100" width="6" height="6" />
      <rect x="140" y="120" width="6" height="6" />
    </g>

    <!-- Circuit Paths inside Chip -->
    <g stroke="#00f0ff" stroke-width="1.5" fill="none" opacity="0.6">
      <path d="M 20,20 L 50,50 L 90,50" />
      <path d="M 120,20 L 90,50" />
      <path d="M 20,120 L 50,90 L 90,90" />
      <path d="M 120,120 L 90,90" />
      <circle cx="50" cy="50" r="3" fill="#00f0ff" />
      <circle cx="90" cy="50" r="3" fill="#00f0ff" />
      <circle cx="50" cy="90" r="3" fill="#00f0ff" />
      <circle cx="90" cy="90" r="3" fill="#00f0ff" />
    </g>

    <!-- Center Processor Core -->
    <rect x="40" y="40" width="60" height="60" rx="6" fill="#0b1d33" stroke="#00f0ff" stroke-width="2" filter="url(#neon-glow-blue)" />
    <text x="70" y="77" font-family="'Montserrat', sans-serif" font-size="24" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="1">AI</text>
  </g>

  <!-- ROBOTIC ARM COMPONENT (Left Side) -->
  <g id="robotic-arm" transform="translate(10, 80)">
    <!-- Base Mount -->
    <ellipse cx="60" cy="300" rx="35" ry="12" fill="url(#metal-dark)" stroke="#1f2933" stroke-width="2" />
    <rect x="45" y="270" width="30" height="25" rx="5" fill="url(#metal-arm)" stroke="#486581" stroke-width="1.5" />
    
    <!-- Base Joint (Pivot) -->
    <circle cx="60" cy="265" r="14" fill="url(#metal-dark)" stroke="#fff" stroke-width="1" />
    <circle cx="60" cy="265" r="5" fill="#ff9800" filter="url(#neon-glow-orange)" />
    
    <!-- Lower Arm Segment -->
    <!-- Rotated ~-45deg -->
    <g transform="translate(60, 265) rotate(-40)">
      <rect x="-8" y="-100" width="16" height="100" rx="6" fill="url(#metal-arm)" stroke="#486581" stroke-width="1.5" />
      <!-- Hydraulic cylinder -->
      <line x1="12" y1="-20" x2="12" y2="-80" stroke="#d9e2ec" stroke-width="4" stroke-linecap="round" />
      <line x1="12" y1="-40" x2="12" y2="-80" stroke="url(#metal-dark)" stroke-width="2" stroke-linecap="round" />
      
      <!-- Elbow Joint -->
      <circle cx="0" cy="-100" r="11" fill="url(#metal-dark)" stroke="#fff" stroke-width="1" />
      <circle cx="0" cy="-100" r="4" fill="#00d2ff" />
      
      <!-- Upper Arm Segment -->
      <!-- Rotated ~70deg relative to elbow -->
      <g transform="translate(0, -100) rotate(75)">
        <rect x="-6" y="-80" width="12" height="80" rx="4" fill="url(#metal-arm)" stroke="#486581" stroke-width="1" />
        
        <!-- Wrist Joint -->
        <circle cx="0" cy="-80" r="8" fill="url(#metal-dark)" stroke="#fff" stroke-width="1" />
        <circle cx="0" cy="-80" r="2.5" fill="#ff9800" />
        
        <!-- Gripper / Tool Assembly -->
        <g transform="translate(0, -80) rotate(-35)">
          <path d="M -10,-5 L 10,-5 L 6,-20 L -6,-20 Z" fill="url(#metal-dark)" />
          
          <!-- Claws (2 fingers open) -->
          <!-- Left finger -->
          <path d="M -6,-20 C -12,-28 -8,-40 2,-42 C -4,-35 -4,-28 -2,-20" fill="url(#metal-arm)" stroke="#486581" stroke-width="1" />
          <!-- Right finger -->
          <path d="M 6,-20 C 12,-28 8,-40 -2,-42 C 4,-35 4,-28 2,-20" fill="url(#metal-arm)" stroke="#486581" stroke-width="1" />
          
          <!-- Glowing laser indicator -->
          <circle cx="0" cy="-22" r="2" fill="#00ff66" filter="url(#neon-glow-blue)" />
          <line x1="0" y1="-22" x2="40" y2="-35" stroke="#00ff66" stroke-width="1" stroke-dasharray="2 3" opacity="0.8" />
        </g>
      </g>
    </g>
  </g>

  <!-- ROBOTIC ROVER / CAR COMPONENT (Bottom Center) -->
  <g id="rover" transform="translate(180, 240)">
    <!-- Shadow -->
    <ellipse cx="120" cy="140" rx="80" ry="12" fill="#03060c" opacity="0.8" />

    <!-- Left Treads / Wheels -->
    <rect x="50" y="110" width="30" height="25" rx="5" fill="#141414" stroke="#486581" stroke-width="1" />
    <rect x="130" y="110" width="30" height="25" rx="5" fill="#141414" stroke="#486581" stroke-width="1" />
    <!-- Treads Connector -->
    <rect x="40" y="118" width="130" height="9" rx="2" fill="#2d3748" stroke="#1a202c" />
    
    <!-- Right Treads / Wheels (Background offset) -->
    <g opacity="0.9" transform="translate(25, -15)">
      <rect x="50" y="110" width="30" height="25" rx="5" fill="#141414" />
      <rect x="130" y="110" width="30" height="25" rx="5" fill="#141414" />
      <rect x="40" y="118" width="130" height="9" rx="2" fill="#2d3748" />
    </g>

    <!-- Main Chassis / Body -->
    <path d="M 60,115 
             L 150,115 
             L 165,90 
             L 155,65 
             L 75,65 
             L 55,90 Z" 
          fill="url(#metal-dark)" stroke="#3e566d" stroke-width="2" />
          
    <rect x="75" y="70" width="80" height="15" fill="#1f2933" />
    <rect x="80" y="75" width="70" height="5" fill="#ff9800" filter="url(#neon-glow-orange)" />

    <!-- Robotic Sensor Mast (Neck) -->
    <path d="M 125,65 L 125,30" stroke="url(#metal-arm)" stroke-width="8" stroke-linecap="round" />
    <path d="M 125,50 L 110,65" stroke="url(#metal-dark)" stroke-width="4" />

    <!-- Smart Camera Head -->
    <rect x="105" y="12" width="40" height="20" rx="5" fill="url(#metal-arm)" stroke="#1a202c" stroke-width="1.5" />
    <path d="M 112,22 A 6 6 0 1 1 124,22" fill="none" stroke="#ff9800" stroke-width="2" />
    <!-- Lenses (Dual eyes) -->
    <circle cx="115" cy="22" r="5" fill="#000" stroke="#fff" stroke-width="0.8" />
    <circle cx="115" cy="22" r="2.5" fill="#00d2ff" filter="url(#neon-glow-blue)" />
    
    <circle cx="135" cy="22" r="5" fill="#000" stroke="#fff" stroke-width="0.8" />
    <circle cx="135" cy="22" r="2.5" fill="#00d2ff" filter="url(#neon-glow-blue)" />

    <!-- Antenna -->
    <line x1="75" y1="65" x2="60" y2="25" stroke="#486581" stroke-width="2" />
    <circle cx="60" cy="25" r="3" fill="#ff9800" filter="url(#neon-glow-orange)" />

    <!-- Front Bumper & LED Bar -->
    <path d="M 155,108 L 180,108 L 175,120 L 155,120 Z" fill="#141414" />
    <line x1="180" y1="108" x2="180" y2="120" stroke="#00ffcc" stroke-width="2.5" filter="url(#neon-glow-blue)" />
  </g>

  <!-- Interactive/Floating Elements -->
  <!-- Atom/Quantum Orbit (Center top) -->
  <g id="quantum-atom" transform="translate(300, 75)" opacity="0.8">
    <ellipse cx="0" cy="0" rx="40" ry="12" fill="none" stroke="#00f0ff" stroke-width="1" transform="rotate(30)" />
    <ellipse cx="0" cy="0" rx="40" ry="12" fill="none" stroke="#ff9800" stroke-width="1" transform="rotate(-30)" />
    <ellipse cx="0" cy="0" rx="40" ry="12" fill="none" stroke="#00ff66" stroke-width="1" transform="rotate(90)" />
    <circle cx="0" cy="0" r="6" fill="#ffffff" filter="url(#neon-glow-blue)" />
    
    <circle cx="28" cy="16" r="3" fill="#00f0ff" filter="url(#neon-glow-blue)" />
    <circle cx="-28" cy="16" r="3" fill="#ff9800" filter="url(#neon-glow-orange)" />
  </g>

  <!-- Floating Digital Code/Binary Bits -->
  <g fill="#00f0ff" font-family="monospace" font-size="10" opacity="0.3">
    <text x="250" y="160">10101</text>
    <text x="280" y="190">01</text>
    <text x="220" y="210">STEM</text>
    <text x="340" y="130">&lt;AI&gt;</text>
  </g>
</svg>
