<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 600" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="s-gradient" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ff7b00" />
      <stop offset="30%" stop-color="#ff3c00" />
      <stop offset="70%" stop-color="#b3001e" />
      <stop offset="100%" stop-color="#6e0012" />
    </linearGradient>

    <linearGradient id="a-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f2f2f2" />
      <stop offset="30%" stop-color="#a6a6a6" />
      <stop offset="70%" stop-color="#4d4d4d" />
      <stop offset="100%" stop-color="#1a1a1a" />
    </linearGradient>

    <linearGradient id="gear-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8c8c8c" />
      <stop offset="50%" stop-color="#3c3c3c" />
      <stop offset="100%" stop-color="#141414" />
    </linearGradient>

    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="3" dy="5" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <g id="logo-mark" filter="url(#shadow)">
    <!-- GEAR WHEEL (Bottom left/middle background layer) -->
    <!-- Gear outer shape: 8 teeth -->
    <path d="M 190 322 
             L 210 327 A 90 90 0 0 1 238 355
             L 242 375 A 15 15 0 0 1 230 390
             L 212 390 A 15 15 0 0 0 200 405
             L 190 422 A 15 15 0 0 1 172 428
             L 155 423 A 90 90 0 0 1 127 395
             L 107 391 A 15 15 0 0 1 97 372
             L 102 355 A 15 15 0 0 0 90 340
             L 73 330 A 15 15 0 0 1 67 312
             L 72 295 A 90 90 0 0 1 100 267
             L 96 247 A 15 15 0 0 1 114 232
             L 131 237 A 15 15 0 0 0 148 227
             L 158 210 A 15 15 0 0 1 176 204
             L 193 209 A 90 90 0 0 1 221 237
             L 241 241 A 15 15 0 0 1 251 260
             L 246 277 A 15 15 0 0 0 258 292
             Z" 
          fill="url(#gear-gradient)" stroke="#222" stroke-width="1.5" />
          
    <!-- Gear inner hole and cutouts -->
    <circle cx="165" cy="315" r="45" fill="#0b1220" />
    <path d="M 165 285 L 165 345 M 135 315 L 195 315" stroke="url(#gear-gradient)" stroke-width="8" stroke-linecap="round" opacity="0.3" />
    <circle cx="165" cy="315" r="20" fill="#0b1220" />

    <!-- LETTER "A" (Grey Gradient, Background of S) -->
    <!-- Stylized right part of logo -->
    <path d="M 270 145 
             L 345 320 
             A 15 15 0 0 1 331 340 
             L 310 340 
             L 280 270 
             L 245 270 
             L 225 320 
             A 12 12 0 0 1 213 328
             L 190 328
             L 230 230 
             L 255 170
             Z" 
          fill="url(#a-gradient)" stroke="#1a1a1a" stroke-width="1.5" />
          
    <path d="M 270 145
             L 310 95
             A 10 10 0 0 1 326 95
             L 395 255
             A 15 15 0 0 1 395 270
             L 360 350
             A 15 15 0 0 1 345 358
             L 312 358
             L 290 310
             L 318 310
             L 342 255
             L 295 145
             Z" 
          fill="url(#a-gradient)" stroke="#1a1a1a" stroke-width="1.5" />

    <!-- A-Letter Inner Cutout Triangle -->
    <polygon points="268,220 285,260 250,260" fill="#0b1220" />

    <!-- LETTER "S" (Orange-Red Gradient, Foreground Layer) -->
    <!-- Curving around the gear and A -->
    <path d="M 255 60
             C 170 60, 110 110, 110 170
             C 110 230, 160 250, 200 270
             C 255 295, 305 320, 305 390
             C 305 460, 240 510, 150 510
             C 110 510, 85 495, 75 480
             C 65 465, 70 445, 85 435
             C 100 425, 120 430, 130 445
             C 135 450, 145 460, 160 460
             C 200 460, 245 425, 245 385
             C 245 340, 205 320, 165 300
             C 115 275, 55 245, 55 170
             C 55 90, 130 10, 260 10
             C 295 10, 320 20, 330 35
             C 340 50, 335 70, 320 80
             C 305 90, 285 85, 275 70
             C 270 63, 263 60, 255 60 Z" 
          fill="url(#s-gradient)" stroke="#500" stroke-width="2" />

    <!-- CIRCUIT LINES & NODES (Overlay on 'S') -->
    <g id="s-circuits" stroke="#fff" stroke-width="2.5" fill="none" opacity="0.95">
      <!-- Upper S trace -->
      <path d="M 255,30 L 195,30 L 145,80 L 145,140 L 175,170 M 145,120 L 170,145" />
      <path d="M 245,45 L 210,45 L 165,90 L 165,130" />
      <!-- Lower S trace -->
      <path d="M 165,370 L 215,370 L 265,420 L 265,460 M 235,420 L 235,450" stroke-width="2.5"/>
      <path d="M 185,385 L 210,385 L 245,420 L 245,445" />
    </g>

    <!-- CIRCUIT DOTS (Overlay on 'S' terminals) -->
    <g id="s-dots" fill="#fff">
      <circle cx="255" cy="30" r="5" />
      <circle cx="245" cy="45" r="4.5" />
      <circle cx="175" cy="170" r="4.5" />
      <circle cx="170" cy="145" r="4" />
      <circle cx="265" cy="460" r="5" />
      <circle cx="235" cy="450" r="4" />
      <circle cx="245" cy="445" r="4" />
      <circle cx="165" cy="370" r="4.5" />
    </g>
    
    <!-- CIRCUIT LINES & NODES (Overlay on 'A') -->
    <g id="a-circuits" stroke="#fff" stroke-width="2.5" fill="none" opacity="0.9">
      <path d="M 320,120 L 350,190 L 350,260 M 350,220 L 370,265" />
      <path d="M 292,165 L 320,230 L 320,290" />
      <!-- A Crossbar connection -->
      <path d="M 250,250 L 290,250" />
    </g>
    
    <!-- CIRCUIT DOTS (Overlay on 'A' terminals) -->
    <g id="a-dots" fill="#fff">
      <circle cx="320" cy="120" r="5" fill="#e0e0e0" stroke="#333" stroke-width="1" />
      <circle cx="350" cy="260" r="5.5" />
      <circle cx="370" cy="265" r="4.5" />
      <circle cx="320" cy="290" r="5" />
      <circle cx="290" cy="250" r="4" />
    </g>

    <!-- Additional Small Circuit Node at Center Gear Intersection -->
    <g stroke="#fff" stroke-width="2" fill="none">
      <path d="M 165,270 L 165,295" />
      <circle cx="165" cy="295" r="4" fill="#fff" />
    </g>
  </g>

  <!-- BRAND NAME & TYPOGRAPHY -->
  <g id="brand-text" text-anchor="middle">
    <!-- SAEDGE -->
    <text x="250" y="525" 
          font-family="'Montserrat', 'Arial Rounded MT Bold', sans-serif" 
          font-size="62" 
          font-weight="900" 
          fill="#ffffff" 
          letter-spacing="1">SAEDGE</text>
          
    <!-- AI AUTOMATIONS -->
    <text x="250" y="570" 
          font-family="'Montserrat', 'Inter', 'Roboto', sans-serif" 
          font-size="26" 
          font-weight="300" 
          fill="#ffffff" 
          letter-spacing="5">AI AUTOMATIONS</text>
  </g>
</svg>
